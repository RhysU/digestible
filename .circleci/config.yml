# See https://circleci.com/docs/2.0/reusing-config/
version: 2.1

executors:
  python-docker:
    parameters:
      version:
        description: "Python version"
        default: "3.9"
        type: string
    docker:
      - image: cimg/python:<<parameters.version>>

jobs:
  test:
    parameters:
      version:
        description: "Python version"
        default: "3.9"
        type: string
    executor:
      name: python-docker
      version: <<parameters.version>>
    steps:
      - checkout
      - run: python -m pip install ".[dev]"
      - run: python -m pytest tests

  docs:
    executor:
      name: python-docker
      version: "3.13"
    steps:
      - checkout
      - run: python -m pip install ".[docs]"
      - run: make docs

workflows:
  matrix-tests:
    jobs:
      - test:
          matrix:
            parameters:
              version:
                - "3.13"
      - docs
