# See https://circleci.com/docs/2.0/reusing-config/
version: 2.1

executors:
  python-docker:
    parameters:
      version:
        description: "Python version"
        default: "3.9"
        type: string
    docker:
      - image: cimg/python:<<parameters.version>>

jobs:
  test:
    parameters:
      version:
        description: "Python version"
        default: "3.9"
        type: string
    executor:
      name: python-docker
      version: <<parameters.version>>
    steps:
      - checkout
      - run: python -m pip install ".[dev]"
      - run: python -m pytest tests

  mypy:
    parameters:
      version:
        description: "Python version"
        default: "3.9"
        type: string
    executor:
      name: python-docker
      version: <<parameters.version>>
    steps:
      - checkout
      - run: python -m pip install ".[dev]"
      - run: python -m mypy digestible

  deploy-docs:
    executor:
      name: python-docker
      version: "3.13"
    steps:
      - checkout
      - run:
          name: Install PyDoctor
          command: |
            python -m pip install ".[docs]"
      - run:
          name: Build PyDoctor documentation
          command: |
            python -m pydoctor
      - run:
          name: Deploy to gh-pages
          command: |
            if [ "${CIRCLE_BRANCH}" = "master" ]; then
              echo "Deploying documentation to gh-pages..."
              ./.circleci/deploy-ghpages.sh apidocs
            else
              echo "Not master (current: ${CIRCLE_BRANCH}), skipping deployment"
            fi

workflows:
  matrix-tests:
    jobs:
      - test:
          matrix:
            parameters:
              version:
                - "3.13"
      - mypy:
          matrix:
            parameters:
              version:
                - "3.13"
      - deploy-docs:
          requires:
            - test
            - mypy
